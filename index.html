<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflows</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 24px; }
  .container { max-width: 680px; width: 100%; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; text-align: center; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 40px; text-align: center; }

  .process { display: flex; flex-direction: column; align-items: center; }

  .card { background: #fff; border: 1px solid #e2e2e2; border-radius: 12px; padding: 20px 24px; text-decoration: none; color: inherit; display: block; transition: box-shadow 0.2s, transform 0.2s; }
  .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.1); transform: translateY(-2px); }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .card p { font-size: 13px; color: #666; line-height: 1.5; }

  .card-kickoff h2 { color: #3F51B5; }
  .card-campaigns h2 { color: #C5A000; }
  .card-flows h2 { color: #7E57C2; }

  .top-card { width: 300px; }

  .connector-down { display: flex; flex-direction: column; align-items: center; padding: 6px 0 0; }
  .connector-down .pipe { width: 2px; height: 28px; background: #bbb; }

  .split { display: flex; width: 100%; justify-content: center; position: relative; padding-top: 0; gap: 40px; }
  .split::before { content: ''; position: absolute; top: 0; left: calc(50% - 170px); width: 340px; height: 2px; background: #bbb; }
  .split-branch { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 300px; }
  .split-branch .branch-pipe { width: 2px; height: 24px; background: #bbb; }
  .split-branch .branch-arrow { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 7px solid #bbb; margin-bottom: 12px; }

  .footer { margin-top: 40px; font-size: 12px; color: #999; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h1>Workflows</h1>
  <p class="subtitle">Full process overview for the L&C team</p>

  <div class="process">

    <a class="card card-kickoff top-card" href="kickoff-onboarding.html">
      <h2>Kickoff & Onboarding</h2>
      <p>Initial client setup, kickoff, and onboarding process.</p>
    </a>

    <div class="connector-down"><div class="pipe"></div></div>

    <div class="split">
      <div class="split-branch">
        <div class="branch-pipe"></div>
        <div class="branch-arrow"></div>
        <a class="card card-campaigns" href="campaigns-workflow.html">
          <h2>Campaigns</h2>
          <p>Detailed campaign workflow.</p>
        </a>
      </div>
      <div class="split-branch">
        <div class="branch-pipe"></div>
        <div class="branch-arrow"></div>
        <a class="card card-flows" href="flows-workflow.html">
          <h2>Flows</h2>
          <p>Detailed flow workflow.</p>
        </a>
      </div>
    </div>

  </div>

  <div class="footer">To request changes, open the Claude project and describe the update you need.</div>
</div>
</body>
</html>
